name: Dependency Check

on:
  pull_request:
    paths:
      - 'ayunis-core-backend/src/**/*.ts'
      - 'ayunis-core-backend/.dependency-cruiser.cjs'
      - 'ayunis-core-frontend/src/**/*.ts'
      - 'ayunis-core-frontend/src/**/*.tsx'
      - 'ayunis-core-frontend/.dependency-cruiser.cjs'
      - '.github/workflows/dependency-check.yml'

jobs:
  backend:
    name: Backend (Hexagonal)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ayunis-core-backend

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm run build:deps

      - name: Run dependency check
        run: pnpm run deps:check

      - name: Generate violation report (on failure)
        if: failure()
        run: |
          pnpm exec dependency-cruiser src --config .dependency-cruiser.cjs --ignore-known --output-type err-html > dependency-violations.html || true
          echo "::error::Backend architecture violations detected. See artifact for details."

      - name: Upload violation report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-dependency-violations
          path: ayunis-core-backend/dependency-violations.html
          retention-days: 7

  frontend:
    name: Frontend (FSD)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ayunis-core-frontend

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency check
        run: pnpm run deps:check

      - name: Generate violation report (on failure)
        if: failure()
        run: |
          pnpm exec dependency-cruiser src --config .dependency-cruiser.cjs --ignore-known --output-type err-html > dependency-violations.html || true
          echo "::error::Frontend FSD violations detected. See artifact for details."

      - name: Upload violation report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dependency-violations
          path: ayunis-core-frontend/dependency-violations.html
          retention-days: 7
