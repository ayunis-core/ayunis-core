version: 2
updates:
  # Root package.json (husky, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      root-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Backend (NestJS)
  - package-ecosystem: "npm"
    directory: "/ayunis-core-backend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps-backend)"
    labels:
      - "dependencies"
      - "backend"
    open-pull-requests-limit: 8
    groups:
      nest:
        patterns:
          - "@nestjs/*"
        update-types:
          - "minor"
          - "patch"
      typescript:
        patterns:
          - "typescript"
          - "ts-*"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "jest"
          - "@jest/*"
          - "supertest"
        update-types:
          - "minor"
          - "patch"
      other:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Frontend (React/Vite)
  - package-ecosystem: "npm"
    directory: "/ayunis-core-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps-frontend)"
    labels:
      - "dependencies"
      - "frontend"
    open-pull-requests-limit: 8
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"
      tanstack:
        patterns:
          - "@tanstack/*"
        update-types:
          - "minor"
          - "patch"
      radix:
        patterns:
          - "@radix-ui/*"
        update-types:
          - "minor"
          - "patch"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
        update-types:
          - "minor"
          - "patch"
      other:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Anonymize service (Python/uv)
  - package-ecosystem: "uv"
    directory: "/ayunis-core-anonymize"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps-anonymize)"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5

  # Code execution service (Python)
  - package-ecosystem: "pip"
    directory: "/ayunis-core-code-execution"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps-code-execution)"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps-docker)"
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # node:26 caused severe request slowness (connection stalls); runtime is
      # pinned to 24.16.0-alpine. Do not remove without re-validating — see AYC-423.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
    groups:
      docker-images:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/ayunis-core-anonymize"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps-docker)"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/ayunis-core-code-execution"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps-docker)"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps-actions)"
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
