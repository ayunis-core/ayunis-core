[pre-start]
env = '''
set -e
for f in ayunis-core-backend/.env \
         ayunis-core-backend/.env.dev \
         ayunis-core-frontend/.env; do
  src="{{ primary_worktree_path }}/$f"
  if [ -f "$src" ] && [ ! -f "$f" ]; then
    mkdir -p "$(dirname "$f")"
    cp "$src" "$f"
  fi
done
'''

[post-start]
install-node = '''
(cd ayunis-core-backend && npm ci) &
(cd ayunis-core-frontend && npm ci) &
wait
'''
